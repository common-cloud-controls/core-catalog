name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: common-cloud-controls/delivery-toolkit
          path: delivery-toolkit

      - uses: actions/setup-go@v5
        with:
          go-version-file: delivery-toolkit/go.mod

      - name: Build ccc
        run: go build -o /usr/local/bin/ccc ./delivery-toolkit

      - name: Release artifacts
        run: |
          ccc release all core/ccc "Core" \
            --capabilities-dir . \
            --threats-dir . \
            --controls-dir .

      - name: Get website token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.CCC_BOT_APP_ID }}
          private-key: ${{ secrets.CCC_BOT_PRIVATE_KEY }}
          owner: common-cloud-controls
          repositories: website-new

      - name: Publish to website
        run: |
          ccc publish all core/ccc \
            --tag ${{ github.ref_name }} \
            --website-repo common-cloud-controls/website-new
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
