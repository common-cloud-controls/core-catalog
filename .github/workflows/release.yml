name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2026.04.rc-1)'
        required: true

jobs:
  build-toolkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: common-cloud-controls/delivery-toolkit
          ref: main
          path: toolkit

      - uses: actions/setup-go@v6
        with:
          go-version-file: toolkit/go.mod
          cache-dependency-path: toolkit/go.sum

      - name: Build ccc
        run: go build -o toolkit/ccc .
        working-directory: toolkit

      - uses: actions/upload-artifact@v4
        with:
          name: ccc-binary
          path: toolkit/ccc

  release:
    needs: build-toolkit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: ccc-binary
          path: ${{ runner.temp }}/ccc-bin

      - name: Make binary executable
        run: chmod +x ${{ runner.temp }}/ccc-bin/ccc

      - name: Release and publish
        uses: common-cloud-controls/delivery-toolkit@main
        with:
          type: all
          path: core/ccc
          title: Core
          tag: ${{ inputs.tag || github.ref_name }}
          app-id: ${{ secrets.CCC_BOT_APP_ID }}
          private-key: ${{ secrets.CCC_BOT_PRIVATE_KEY }}
          binary: ${{ runner.temp }}/ccc-bin/ccc
